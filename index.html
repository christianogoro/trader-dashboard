<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Trading Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: '#0f172a',
            card: '#1e293b',
            cardHover: '#334155',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f172a; }
    .sparkline-container { height: 40px; }
    .card-border-green { border-top: 3px solid #22c55e; }
    .card-border-red { border-top: 3px solid #ef4444; }
    .card-border-gray { border-top: 3px solid #475569; }
    .filter-btn.active { background: #3b82f6; color: white; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-running { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-stopped { background: #ef4444; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .trade-row:hover { background: #334155; }
  </style>
</head>
<body class="text-slate-100 min-h-screen">

  <!-- Header -->
  <header class="border-b border-slate-700 px-4 py-3 flex items-center justify-between">
    <h1 class="text-xl font-bold tracking-tight">Paper Trading Dashboard</h1>
    <div class="flex items-center gap-4 text-sm text-slate-400">
      <span id="lastSync">Loading...</span>
      <button id="refreshBtn" onclick="fetchData()" class="px-3 py-1 rounded bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs">Refresh</button>
    </div>
  </header>

  <!-- Time Filter Bar -->
  <div class="px-4 py-3 border-b border-slate-800 flex flex-wrap items-center gap-2">
    <button class="filter-btn active px-3 py-1 rounded text-xs bg-slate-700 hover:bg-slate-600" data-period="all" onclick="setFilter('all', this)">ALL</button>
    <button class="filter-btn px-3 py-1 rounded text-xs bg-slate-700 hover:bg-slate-600" data-period="1h" onclick="setFilter('1h', this)">1H</button>
    <button class="filter-btn px-3 py-1 rounded text-xs bg-slate-700 hover:bg-slate-600" data-period="6h" onclick="setFilter('6h', this)">6H</button>
    <button class="filter-btn px-3 py-1 rounded text-xs bg-slate-700 hover:bg-slate-600" data-period="12h" onclick="setFilter('12h', this)">12H</button>
    <button class="filter-btn px-3 py-1 rounded text-xs bg-slate-700 hover:bg-slate-600" data-period="24h" onclick="setFilter('24h', this)">24H</button>
    <button class="filter-btn px-3 py-1 rounded text-xs bg-slate-700 hover:bg-slate-600" data-period="7d" onclick="setFilter('7d', this)">1W</button>
    <button class="filter-btn px-3 py-1 rounded text-xs bg-slate-700 hover:bg-slate-600" data-period="30d" onclick="setFilter('30d', this)">1M</button>
    <button class="filter-btn px-3 py-1 rounded text-xs bg-slate-700 hover:bg-slate-600" data-period="365d" onclick="setFilter('365d', this)">1Y</button>
    <span class="text-slate-500 mx-2">|</span>
    <input type="date" id="dateFrom" class="bg-slate-800 text-slate-300 text-xs px-2 py-1 rounded border border-slate-600" onchange="setCustomFilter()">
    <span class="text-slate-500 text-xs">to</span>
    <input type="date" id="dateTo" class="bg-slate-800 text-slate-300 text-xs px-2 py-1 rounded border border-slate-600" onchange="setCustomFilter()">
  </div>

  <!-- Portfolio Summary -->
  <div id="portfolioSummary" class="px-4 py-4 grid grid-cols-2 md:grid-cols-4 gap-3">
    <div class="bg-card rounded-lg p-3 text-center">
      <div class="text-xs text-slate-400 mb-1">Total Bankroll</div>
      <div id="totalBankroll" class="text-lg font-bold">--</div>
    </div>
    <div class="bg-card rounded-lg p-3 text-center">
      <div class="text-xs text-slate-400 mb-1">Total P&L</div>
      <div id="totalPnl" class="text-lg font-bold">--</div>
    </div>
    <div class="bg-card rounded-lg p-3 text-center">
      <div class="text-xs text-slate-400 mb-1">Win Rate</div>
      <div id="totalWinRate" class="text-lg font-bold">--</div>
    </div>
    <div class="bg-card rounded-lg p-3 text-center">
      <div class="text-xs text-slate-400 mb-1">Active Traders</div>
      <div id="activeTraders" class="text-lg font-bold">--</div>
    </div>
  </div>

  <!-- Trader Cards Grid -->
  <div id="cardsGrid" class="px-4 pb-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <!-- Cards populated by JS -->
  </div>

  <!-- Detail Panel -->
  <div id="detailPanel" class="hidden px-4 pb-8">
    <div class="bg-card rounded-lg p-4">
      <div class="flex items-center justify-between mb-4">
        <h2 id="detailTitle" class="text-lg font-bold"></h2>
        <button onclick="closeDetail()" class="text-slate-400 hover:text-white text-sm">Close</button>
      </div>

      <!-- Charts Row -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
        <div class="bg-slate-800/50 rounded-lg p-3">
          <h3 class="text-xs text-slate-400 mb-2">Equity Curve</h3>
          <canvas id="equityChart" height="200"></canvas>
        </div>
        <div class="bg-slate-800/50 rounded-lg p-3">
          <h3 class="text-xs text-slate-400 mb-2">Daily P&L</h3>
          <canvas id="dailyPnlChart" height="200"></canvas>
        </div>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
        <div class="bg-slate-800/50 rounded-lg p-3">
          <h3 class="text-xs text-slate-400 mb-2">Rolling Win Rate (20-trade)</h3>
          <canvas id="winRateChart" height="200"></canvas>
        </div>
        <div class="bg-slate-800/50 rounded-lg p-3">
          <h3 class="text-xs text-slate-400 mb-2">Win / Loss</h3>
          <canvas id="winLossChart" height="200"></canvas>
        </div>
      </div>

      <!-- Open Positions -->
      <div id="openPosSection" class="mb-4">
        <h3 class="text-sm font-semibold text-slate-300 mb-2">Open Positions</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-xs">
            <thead><tr class="text-slate-400 border-b border-slate-700">
              <th class="text-left py-2 px-2">Symbol</th>
              <th class="text-right py-2 px-2">Entry</th>
              <th class="text-right py-2 px-2">Current</th>
              <th class="text-right py-2 px-2">P&L</th>
              <th class="text-right py-2 px-2">P&L %</th>
              <th class="text-right py-2 px-2">Hold</th>
            </tr></thead>
            <tbody id="openPosBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Recent Trades -->
      <div>
        <h3 class="text-sm font-semibold text-slate-300 mb-2">Recent Trades</h3>
        <div class="overflow-x-auto max-h-80 overflow-y-auto">
          <table class="w-full text-xs">
            <thead class="sticky top-0 bg-card"><tr class="text-slate-400 border-b border-slate-700">
              <th class="text-left py-2 px-2">#</th>
              <th class="text-left py-2 px-2">Symbol</th>
              <th class="text-left py-2 px-2">Dir</th>
              <th class="text-right py-2 px-2">Entry</th>
              <th class="text-right py-2 px-2">Exit</th>
              <th class="text-right py-2 px-2">P&L</th>
              <th class="text-right py-2 px-2">P&L %</th>
              <th class="text-left py-2 px-2">Reason</th>
              <th class="text-left py-2 px-2">Time</th>
            </tr></thead>
            <tbody id="tradesBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── State ──
    let dashData = null;
    let currentFilter = 'all';
    let filterFrom = null;
    let filterTo = null;
    let selectedTrader = null;
    let charts = {};
    let sparkCharts = {};

    // ── Data Loading ──
    async function fetchData() {
      try {
        const resp = await fetch('data.json?' + Date.now());
        dashData = await resp.json();
        render();
        document.getElementById('lastSync').textContent =
          'Synced: ' + new Date(dashData.updated_at).toLocaleString();
      } catch (e) {
        document.getElementById('lastSync').textContent = 'Failed to load data';
        console.error(e);
      }
    }

    // ── Time Filtering ──
    function setFilter(period, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      currentFilter = period;

      const now = new Date();
      const hours = { '1h': 1, '6h': 6, '12h': 12, '24h': 24 };
      const days = { '7d': 7, '30d': 30, '365d': 365 };

      if (period === 'all') {
        filterFrom = null;
        filterTo = null;
      } else if (hours[period]) {
        filterFrom = new Date(now - hours[period] * 3600000);
        filterTo = now;
      } else if (days[period]) {
        filterFrom = new Date(now - days[period] * 86400000);
        filterTo = now;
      }

      render();
    }

    function setCustomFilter() {
      const from = document.getElementById('dateFrom').value;
      const to = document.getElementById('dateTo').value;
      if (from && to) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        currentFilter = 'custom';
        filterFrom = new Date(from + 'T00:00:00');
        filterTo = new Date(to + 'T23:59:59');
        render();
      }
    }

    function filterTrades(trades) {
      if (!filterFrom || !filterTo) return trades;
      return trades.filter(t => {
        const dt = new Date(t.closed_at || t.opened_at);
        return dt >= filterFrom && dt <= filterTo;
      });
    }

    function computeFilteredStats(trader) {
      const filtered = filterTrades(trader.trades || []);
      const wins = filtered.filter(t => t.outcome === 'WIN').length;
      const losses = filtered.length - wins;
      const pnl = filtered.reduce((s, t) => s + (t.pnl || 0), 0);
      const wr = filtered.length > 0 ? (wins / filtered.length * 100) : 0;
      return { wins, losses, total: filtered.length, pnl, winRate: wr, trades: filtered };
    }

    // ── Formatting ──
    function fmt$(v) {
      if (v == null) return '--';
      const abs = Math.abs(v);
      const str = abs >= 1000 ? '$' + (abs/1000).toFixed(1) + 'K' : '$' + abs.toFixed(2);
      return v < 0 ? '-' + str : (v > 0 ? '+' + str : str);
    }

    function fmtPct(v) {
      if (v == null) return '--';
      return (v > 0 ? '+' : '') + v.toFixed(1) + '%';
    }

    function fmtPrice(v) {
      if (v == null || v === 0) return '--';
      if (v < 0.0001) return v.toExponential(3);
      if (v < 1) return v.toFixed(6);
      if (v < 100) return v.toFixed(4);
      return v.toFixed(2);
    }

    function pnlColor(v) {
      if (v > 0) return 'text-green-400';
      if (v < 0) return 'text-red-400';
      return 'text-slate-400';
    }

    function timeAgo(iso) {
      if (!iso) return '--';
      const diff = (Date.now() - new Date(iso).getTime()) / 60000;
      if (diff < 60) return Math.round(diff) + 'm ago';
      if (diff < 1440) return Math.round(diff / 60) + 'h ago';
      return Math.round(diff / 1440) + 'd ago';
    }

    function fmtHold(mins) {
      if (!mins) return '--';
      if (mins < 60) return Math.round(mins) + 'm';
      if (mins < 1440) return (mins / 60).toFixed(1) + 'h';
      return (mins / 1440).toFixed(1) + 'd';
    }

    // ── Rendering ──
    function render() {
      if (!dashData) return;
      const traders = dashData.traders;
      const ids = Object.keys(traders);

      // Portfolio summary
      let totalBankroll = 0, totalPnl = 0, totalWins = 0, totalTrades = 0, activeCount = 0;

      ids.forEach(id => {
        const t = traders[id];
        const stats = computeFilteredStats(t);
        totalBankroll += t.bankroll || 0;
        totalPnl += currentFilter === 'all' ? (t.total_pnl || 0) : stats.pnl;
        totalWins += stats.wins;
        totalTrades += stats.total || (currentFilter === 'all' ? t.total_trades : 0);
        if (t.status === 'running') activeCount++;
      });

      document.getElementById('totalBankroll').textContent = '$' + totalBankroll.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
      const pnlEl = document.getElementById('totalPnl');
      pnlEl.textContent = fmt$(totalPnl);
      pnlEl.className = 'text-lg font-bold ' + pnlColor(totalPnl);
      document.getElementById('totalWinRate').textContent = totalTrades > 0 ? (totalWins / totalTrades * 100).toFixed(1) + '%' : '--';
      document.getElementById('activeTraders').textContent = activeCount + '/' + ids.length + ' active';

      // Cards
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';
      ids.forEach(id => renderCard(id, traders[id], grid));

      // Update detail if open
      if (selectedTrader && traders[selectedTrader]) {
        renderDetail(selectedTrader, traders[selectedTrader]);
      }
    }

    function renderCard(id, trader, container) {
      const stats = computeFilteredStats(trader);
      const pnl = currentFilter === 'all' ? trader.total_pnl : stats.pnl;
      const pnlPct = currentFilter === 'all' ? trader.total_pnl_pct : (trader.starting_bankroll > 0 ? pnl / trader.starting_bankroll * 100 : 0);
      const wr = currentFilter === 'all' ? trader.win_rate : stats.winRate;
      const tradeCount = currentFilter === 'all' ? trader.total_trades : stats.total;

      const borderClass = pnl > 0 ? 'card-border-green' : (pnl < 0 ? 'card-border-red' : 'card-border-gray');
      const isSelected = selectedTrader === id;

      const card = document.createElement('div');
      card.className = `bg-card rounded-lg p-4 cursor-pointer hover:bg-cardHover transition ${borderClass} ${isSelected ? 'ring-2 ring-blue-500' : ''}`;
      card.onclick = () => { selectedTrader = id; render(); document.getElementById('detailPanel').classList.remove('hidden'); };

      card.innerHTML = `
        <div class="flex items-center justify-between mb-2">
          <span class="font-semibold text-sm">${trader.name}</span>
          <span class="flex items-center gap-1 text-xs text-slate-400">
            <span class="status-dot status-${trader.status}"></span>
            ${trader.status}
          </span>
        </div>
        <div class="text-2xl font-bold mb-1">$${(trader.bankroll || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
        <div class="flex items-center gap-3 mb-2">
          <span class="${pnlColor(pnl)} text-sm font-medium">${fmt$(pnl)}</span>
          <span class="${pnlColor(pnlPct)} text-xs">${fmtPct(pnlPct)}</span>
        </div>
        <div class="flex items-center justify-between text-xs text-slate-400 mb-2">
          <span>${wr.toFixed(1)}% WR</span>
          <span>${tradeCount} trades</span>
          <span>${trader.open_positions} open</span>
        </div>
        <div class="sparkline-container">
          <canvas id="spark-${id}" height="40"></canvas>
        </div>
        <div class="flex items-center justify-between text-xs text-slate-500 mt-1">
          <span>Daily: <span class="${pnlColor(trader.daily_pnl)}">${fmt$(trader.daily_pnl)}</span></span>
          <span>Last: ${timeAgo(trader.last_trade_at)}</span>
        </div>
      `;

      container.appendChild(card);

      // Render sparkline
      requestAnimationFrame(() => renderSparkline(id, trader));
    }

    function renderSparkline(id, trader) {
      const canvas = document.getElementById('spark-' + id);
      if (!canvas) return;

      if (sparkCharts[id]) sparkCharts[id].destroy();

      let curve = trader.equity_curve || [];
      if (filterFrom && filterTo) {
        curve = curve.filter(p => {
          const d = new Date(p.date);
          return d >= filterFrom && d <= filterTo;
        });
      }
      const last20 = curve.slice(-20);
      if (last20.length < 2) {
        // Not enough data for sparkline
        return;
      }

      const vals = last20.map(p => p.value);
      const isUp = vals[vals.length - 1] >= vals[0];
      const color = isUp ? '#22c55e' : '#ef4444';

      sparkCharts[id] = new Chart(canvas, {
        type: 'line',
        data: {
          labels: last20.map(p => p.date),
          datasets: [{
            data: vals,
            borderColor: color,
            borderWidth: 1.5,
            fill: true,
            backgroundColor: color + '15',
            pointRadius: 0,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          scales: { x: { display: false }, y: { display: false } },
          animation: false,
        }
      });
    }

    // ── Detail Panel ──
    function renderDetail(id, trader) {
      document.getElementById('detailTitle').textContent = trader.name + ' — Detail View';

      const stats = computeFilteredStats(trader);
      const trades = stats.trades.length > 0 ? stats.trades : trader.trades;

      renderEquityChart(trader);
      renderDailyPnlChart(trades);
      renderWinRateChart(trades);
      renderWinLossChart(stats.wins || trader.wins, stats.losses || trader.losses);
      renderOpenPositions(trader.open || []);
      renderTradesTable(trades);
    }

    function renderEquityChart(trader) {
      if (charts.equity) charts.equity.destroy();
      let curve = trader.equity_curve || [];
      if (filterFrom && filterTo) {
        curve = curve.filter(p => new Date(p.date) >= filterFrom && new Date(p.date) <= filterTo);
      }
      if (curve.length === 0) {
        curve = [{ date: new Date().toISOString().slice(0,10), value: trader.bankroll }];
      }

      const isUp = curve[curve.length - 1].value >= curve[0].value;
      const color = isUp ? '#22c55e' : '#ef4444';

      charts.equity = new Chart(document.getElementById('equityChart'), {
        type: 'line',
        data: {
          labels: curve.map(p => p.date),
          datasets: [{
            label: 'Equity',
            data: curve.map(p => p.value),
            borderColor: color,
            borderWidth: 2,
            fill: true,
            backgroundColor: color + '20',
            pointRadius: curve.length < 30 ? 3 : 0,
            tension: 0.2,
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => '$' + ctx.parsed.y.toFixed(2)
              }
            }
          },
          scales: {
            x: { ticks: { color: '#94a3b8', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: '#1e293b' } },
            y: { ticks: { color: '#94a3b8', callback: v => '$' + v.toLocaleString(), font: { size: 10 } }, grid: { color: '#1e293b' } }
          }
        }
      });
    }

    function renderDailyPnlChart(trades) {
      if (charts.dailyPnl) charts.dailyPnl.destroy();

      // Group by date
      const daily = {};
      trades.forEach(t => {
        const d = (t.closed_at || t.opened_at || '').slice(0, 10);
        if (d) daily[d] = (daily[d] || 0) + (t.pnl || 0);
      });

      const dates = Object.keys(daily).sort();
      const vals = dates.map(d => daily[d]);

      charts.dailyPnl = new Chart(document.getElementById('dailyPnlChart'), {
        type: 'bar',
        data: {
          labels: dates,
          datasets: [{
            label: 'Daily P&L',
            data: vals,
            backgroundColor: vals.map(v => v >= 0 ? '#22c55e80' : '#ef444480'),
            borderColor: vals.map(v => v >= 0 ? '#22c55e' : '#ef4444'),
            borderWidth: 1,
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => fmt$(ctx.parsed.y) } }
          },
          scales: {
            x: { ticks: { color: '#94a3b8', maxTicksLimit: 8, font: { size: 10 } }, grid: { display: false } },
            y: { ticks: { color: '#94a3b8', callback: v => '$' + v, font: { size: 10 } }, grid: { color: '#1e293b' } }
          }
        }
      });
    }

    function renderWinRateChart(trades) {
      if (charts.winRate) charts.winRate.destroy();

      const window = 20;
      const points = [];
      const sorted = [...trades].sort((a, b) => (a.closed_at || '').localeCompare(b.closed_at || ''));

      for (let i = 0; i < sorted.length; i++) {
        const start = Math.max(0, i - window + 1);
        const slice = sorted.slice(start, i + 1);
        const wins = slice.filter(t => t.outcome === 'WIN').length;
        points.push({
          x: i + 1,
          y: (wins / slice.length) * 100,
        });
      }

      charts.winRate = new Chart(document.getElementById('winRateChart'), {
        type: 'line',
        data: {
          labels: points.map(p => p.x),
          datasets: [
            {
              label: 'Win Rate %',
              data: points.map(p => p.y),
              borderColor: '#3b82f6',
              borderWidth: 2,
              fill: false,
              pointRadius: 0,
              tension: 0.3,
            },
            {
              label: '50%',
              data: points.map(() => 50),
              borderColor: '#475569',
              borderWidth: 1,
              borderDash: [5, 5],
              pointRadius: 0,
              fill: false,
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(1) + '%' } }
          },
          scales: {
            x: { title: { display: true, text: 'Trade #', color: '#64748b', font: { size: 10 } }, ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { display: false } },
            y: { min: 0, max: 100, ticks: { color: '#94a3b8', callback: v => v + '%', font: { size: 10 } }, grid: { color: '#1e293b' } }
          }
        }
      });
    }

    function renderWinLossChart(wins, losses) {
      if (charts.winLoss) charts.winLoss.destroy();

      const total = wins + losses;
      if (total === 0) {
        // Empty state
        charts.winLoss = new Chart(document.getElementById('winLossChart'), {
          type: 'doughnut',
          data: { labels: ['No trades'], datasets: [{ data: [1], backgroundColor: ['#475569'] }] },
          options: { responsive: true, plugins: { legend: { display: false } } }
        });
        return;
      }

      charts.winLoss = new Chart(document.getElementById('winLossChart'), {
        type: 'doughnut',
        data: {
          labels: ['Wins', 'Losses'],
          datasets: [{
            data: [wins, losses],
            backgroundColor: ['#22c55e', '#ef4444'],
            borderWidth: 0,
          }]
        },
        options: {
          responsive: true,
          cutout: '65%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#94a3b8', font: { size: 11 }, padding: 12 }
            },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.label}: ${ctx.parsed} (${(ctx.parsed / total * 100).toFixed(1)}%)`
              }
            }
          }
        },
        plugins: [{
          id: 'centerText',
          afterDraw(chart) {
            const { ctx, chartArea: { width, height, top } } = chart;
            ctx.save();
            ctx.font = 'bold 24px sans-serif';
            ctx.fillStyle = '#f1f5f9';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText((wins / total * 100).toFixed(0) + '%', width / 2 + chart.chartArea.left, top + height / 2);
            ctx.restore();
          }
        }]
      });
    }

    function renderOpenPositions(positions) {
      const section = document.getElementById('openPosSection');
      const body = document.getElementById('openPosBody');

      if (positions.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      body.innerHTML = positions.map(p => `
        <tr class="trade-row border-b border-slate-800">
          <td class="py-1.5 px-2 font-medium">${p.symbol}</td>
          <td class="py-1.5 px-2 text-right">${fmtPrice(p.entry_price)}</td>
          <td class="py-1.5 px-2 text-right">${fmtPrice(p.current_price)}</td>
          <td class="py-1.5 px-2 text-right ${pnlColor(p.pnl)}">${fmt$(p.pnl)}</td>
          <td class="py-1.5 px-2 text-right ${pnlColor(p.pnl_pct)}">${fmtPct(p.pnl_pct)}</td>
          <td class="py-1.5 px-2 text-right">${fmtHold(p.hold_minutes)}</td>
        </tr>
      `).join('');
    }

    function renderTradesTable(trades) {
      const body = document.getElementById('tradesBody');
      const sorted = [...trades].sort((a, b) => (b.closed_at || '').localeCompare(a.closed_at || '')).slice(0, 50);

      body.innerHTML = sorted.map(t => `
        <tr class="trade-row border-b border-slate-800">
          <td class="py-1.5 px-2 text-slate-500">${t.id || '--'}</td>
          <td class="py-1.5 px-2 font-medium">${t.symbol}</td>
          <td class="py-1.5 px-2">${t.direction}</td>
          <td class="py-1.5 px-2 text-right">${fmtPrice(t.entry_price)}</td>
          <td class="py-1.5 px-2 text-right">${fmtPrice(t.exit_price)}</td>
          <td class="py-1.5 px-2 text-right ${pnlColor(t.pnl)}">${fmt$(t.pnl)}</td>
          <td class="py-1.5 px-2 text-right ${pnlColor(t.pnl_pct)}">${fmtPct(t.pnl_pct)}</td>
          <td class="py-1.5 px-2 text-slate-400">${t.exit_reason || '--'}</td>
          <td class="py-1.5 px-2 text-slate-400">${timeAgo(t.closed_at)}</td>
        </tr>
      `).join('');
    }

    function closeDetail() {
      selectedTrader = null;
      document.getElementById('detailPanel').classList.add('hidden');
      render();
    }

    // ── Init ──
    fetchData();
    setInterval(fetchData, 30000);
  </script>
</body>
</html>
